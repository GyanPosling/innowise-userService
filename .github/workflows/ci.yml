name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build
        run: ./mvnw -q -DskipTests package

      - name: Test
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: ./mvnw -q test

      - name: SonarCloud Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          ./mvnw -q -DskipTests=true
          sonar:sonar
          -Dsonar.projectKey=GyanPosling_innowise-userService
          -Dsonar.organization=gyanposling
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.pullrequest.key=${{ github.event.pull_request.number }}
          -Dsonar.pullrequest.branch=${{ github.head_ref }}
          -Dsonar.pullrequest.base=${{ github.base_ref }}

  docker-image:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t userservice:ci .

      - name: Save Docker image artifact
        run: docker save userservice:ci | gzip > userservice-image.tar.gz

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: userservice-image
          path: userservice-image.tar.gz
