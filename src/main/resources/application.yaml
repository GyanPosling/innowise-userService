spring:
  application:
    name: userservice

security:
  internal:
    secret: ${SERVICES_INTERNAL_SECRET:internal-secret}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
