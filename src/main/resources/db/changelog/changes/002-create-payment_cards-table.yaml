databaseChangeLog:
  - changeSet:
      id: 002-create-payment-cards-table
      author: bursh
      changes:
        - createTable:
            tableName: payment_cards
            remarks: "User payment cards"
            columns:
              - column:
                  name: id
                  type: INTEGER
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: user_id
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: number
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: holder
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: expiration_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: active
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false

        - sql:
            dbms: postgresql
            sql: ALTER TABLE payment_cards ALTER COLUMN id ADD GENERATED ALWAYS AS IDENTITY;

        - addForeignKeyConstraint:
            baseTableName: payment_cards
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_payment_cards_user_id
            onDelete: CASCADE
            onUpdate: CASCADE

        - createIndex:
            indexName: idx_payment_cards_user_id
            tableName: payment_cards
            columns:
              - column:
                  name: user_id

        - createIndex:
            indexName: idx_payment_cards_active
            tableName: payment_cards
            columns:
              - column:
                  name: active
